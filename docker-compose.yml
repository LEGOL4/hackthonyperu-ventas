services:

  postgres:
    image: postgres:17-alpine
    container_name: hackthonyperu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackthonyperu_ventas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql 
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hackthonyperu_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres        # ← nombre del servicio, no localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: hackthonyperu_ventas
      JWT_SECRET: hackthonyperu_secret_2026
      JWT_EXPIRES_IN: 8h
      EMAIL_USER: leonardorojasasto@gmail.com
      EMAIL_PASS: zmho kiki zjot hrfw
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: hackthonyperu_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: